apiVersion: apps/v1
kind: Deployment
metadata:
  name: nl2sql-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nl2sql-backend
  template:
    metadata:
      labels:
        app: nl2sql-backend
    spec:
      containers:
      - name: backend
        image: nl2sql-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
